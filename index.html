#trailCanvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1}
#lemon{position:fixed;width:169px;height:auto;cursor:grab;user-select:none;z-index:50;
  filter:drop-shadow(0 6px 18px rgba(0,0,0,0.15));touch-action:none}
#lemon.dragging{cursor:grabbing;filter:drop-shadow(0 14px 30px rgba(0,0,0,0.25))}

/* ── Layout: full-height flex ── */
#ui{
  position:fixed;top:0;left:50%;transform:translateX(-50%);
  z-index:30;width:min(420px,92vw);
  height:100%;display:flex;flex-direction:column;
  padding:env(safe-area-inset-top,12px) 0 env(safe-area-inset-bottom,12px);
}
#ui-title{
  text-align:center;font-size:13px;font-weight:500;letter-spacing:.22em;
  color:rgba(40,40,70,.65);
  padding:18px 0 12px;flex-shrink:0;
}
  #ui-inner {
  flex: 1;
  overflow-y: auto;
  /* スクロールバーを隠す設定は維持しつつ、確実にスクロールを有効化 */
  -webkit-overflow-scrolling: touch;
  padding: max(28px, 5vh) 0 20px; /* 下部に少し余白を追加 */
  min-height: 0; /* Flexbox内でのスクロール崩れ防止 */
}
/* Cards area scrolls, footer stays pinned */
#cards-scroll{
  flex:1;overflow-y:auto;overflow-x:hidden;
  padding:0 0 8px;
  scrollbar-width:none;
  -webkit-overflow-scrolling:touch;
}
#cards-scroll::-webkit-scrollbar{display:none}
.cards {
  display: grid;
  gap: 8px;
  padding-bottom: 40px; /* 最後のカードがフッターに被らないようにする余白 */
}
.card{
  background:rgba(255,255,255,.3);
  backdrop-filter:blur(18px) saturate(1.4);
  -webkit-backdrop-filter:blur(18px) saturate(1.4);
  border:0.5px solid rgba(140,160,210,.3);
  border-radius:13px;padding:11px 14px;
  cursor:pointer;transition:background .15s;
}
.card:active{background:rgba(240,244,255,.6)}
.card.locked{border-color:rgba(90,130,210,.45)}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.card-label{font-size:10px;font-weight:500;letter-spacing:.14em;color:rgba(80,100,150,.65)}
.lock-btn{
  width:28px;height:28px;border:0.5px solid rgba(140,160,210,.35);
  border-radius:7px;background:transparent;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:rgba(120,145,195,.55);transition:all .15s;padding:0;flex-shrink:0;
}
.lock-btn.on{
  background:rgba(210,220,245,.55);border-color:rgba(90,130,210,.5);
  color:rgba(60,90,180,.8);
}
.card-value{
  font-size:20px;font-weight:500;color:rgba(28,38,70,.85);
  letter-spacing:-.01em;min-height:28px;
}
.card-value.empty{color:rgba(160,170,200,.5);font-size:16px}

/* ── Footer: always visible ── */
#ui-footer{
  display:flex;gap:8px;
  padding:10px 0 0;flex-shrink:0;
}
#roll-btn{
  flex:1;padding:13px;font-size:13px;font-weight:500;letter-spacing:.1em;
  font-family:inherit;
  background:rgba(50,75,170,.8);color:rgba(255,255,255,.95);
  border:none;border-radius:12px;cursor:pointer;transition:opacity .15s,transform .1s;
}
#roll-btn:hover{opacity:.88}
#roll-btn:active{transform:scale(.98)}
#roll-btn:disabled{opacity:.35;cursor:not-allowed}
#add-btn{
  width:48px;height:48px;font-size:22px;
  background:rgba(255,255,255,.5);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border:0.5px solid rgba(140,160,210,.35);
  border-radius:12px;cursor:pointer;color:rgba(80,110,190,.7);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:background .15s;
}
#add-btn:active{background:rgba(230,236,255,.95)}

/* ── Bottom Sheet (selection) ── */
#sheet-overlay{
  position:fixed;inset:0;z-index:100;
  background:rgba(0,0,0,0);transition:background .25s;pointer-events:none;
}
#sheet-overlay.open{background:rgba(0,0,0,.25);pointer-events:auto}
#sheet{
  position:absolute;bottom:0;left:0;right:0;
  background:#fff;border-radius:18px 18px 0 0;
  max-height:72vh;display:flex;flex-direction:column;
  transform:translateY(100%);transition:transform .28s cubic-bezier(.22,1,.36,1);
  box-shadow:0 -4px 40px rgba(0,0,0,.12);
}
#sheet-overlay.open #sheet{transform:translateY(0)}
#sheet-handle{width:36px;height:4px;background:rgba(0,0,0,.12);border-radius:2px;margin:10px auto 0;flex-shrink:0}
#sheet-header{
  padding:12px 16px 10px;display:flex;align-items:center;justify-content:space-between;
  border-bottom:0.5px solid rgba(0,0,0,.07);flex-shrink:0;
}
#sheet-title{font-size:13px;font-weight:500;color:rgba(30,40,80,.8);letter-spacing:.06em}
/* Header right: delete + close */
#sheet-header-actions{display:flex;align-items:center;gap:8px}
#sheet-delete-btn{
  padding:5px 12px;font-size:12px;font-family:inherit;
  border:0.5px solid rgba(210,80,80,.35);border-radius:20px;
  background:transparent;color:rgba(200,60,60,.75);cursor:pointer;
  transition:background .15s;white-space:nowrap;
}
#sheet-delete-btn:active{background:rgba(255,220,220,.6)}
#sheet-back-btn{
  width:28px;height:28px;border:none;background:rgba(0,0,0,.06);
  border-radius:50%;cursor:pointer;color:rgba(0,0,0,.4);
  display:flex;align-items:center;justify-content:center;
  font-size:18px;line-height:1;padding-bottom:1px;
}
#sheet-list{overflow-y:auto;flex:1;padding:6px 0 24px}
.sheet-opt{
  padding:13px 18px;font-size:15px;color:rgba(28,38,70,.85);
  cursor:pointer;display:flex;align-items:center;justify-content:space-between;
  transition:background .1s;
}
.sheet-opt:active{background:rgba(230,236,255,.8)}
.sheet-opt.selected{color:rgba(50,80,190,.9);font-weight:500}
.check{width:18px;height:18px;color:rgba(50,80,190,.8)}

/* ── Delete confirm ── */
#del-confirm{
  position:fixed;inset:0;z-index:200;
  display:flex;align-items:flex-end;justify-content:center;
  background:rgba(0,0,0,0);transition:background .2s;pointer-events:none;
}
#del-confirm.open{background:rgba(0,0,0,.3);pointer-events:auto}
#del-confirm-box{
  width:min(360px,92vw);margin:0 auto 24px;
  background:#fff;border-radius:16px;overflow:hidden;
  transform:translateY(20px) scale(.97);opacity:0;
  transition:transform .22s cubic-bezier(.22,1,.36,1),opacity .22s;
}
#del-confirm.open #del-confirm-box{transform:none;opacity:1}
#del-confirm-msg{padding:18px 18px 14px;font-size:14px;color:rgba(28,38,70,.8);text-align:center;line-height:1.6}
#del-confirm-msg strong{color:rgba(28,38,70,.95)}
#del-confirm-actions{display:grid;grid-template-columns:1fr 1fr;border-top:0.5px solid rgba(0,0,0,.08)}
.del-btn{
  padding:14px;font-size:14px;font-family:inherit;border:none;cursor:pointer;
  background:transparent;transition:background .12s;
}
.del-btn:active{background:rgba(0,0,0,.06)}
#del-btn-cancel{color:rgba(80,100,160,.8);border-right:0.5px solid rgba(0,0,0,.08)}
#del-btn-ok{color:rgba(200,50,50,.85);font-weight:500}

/* ── Add Form ── */
#form-overlay{
  position:fixed;inset:0;z-index:110;
  background:rgba(0,0,0,0);transition:background .25s;pointer-events:none;
}
#form-overlay.open{background:rgba(0,0,0,.3);pointer-events:auto}
#form-panel{
  position:absolute;bottom:0;left:0;right:0;
  background:#fff;border-radius:18px 18px 0 0;padding:0 0 0;
  transform:translateY(100%);transition:transform .28s cubic-bezier(.22,1,.36,1);
  box-shadow:0 -4px 40px rgba(0,0,0,.14);
  max-height:85vh;display:flex;flex-direction:column;
}
#form-overlay.open #form-panel{transform:translateY(0)}
#form-handle{width:36px;height:4px;background:rgba(0,0,0,.12);border-radius:2px;margin:10px auto 0;flex-shrink:0}
#form-scroll{overflow-y:auto;flex:1;padding:0 18px 8px;-webkit-overflow-scrolling:touch}
#form-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 0 12px;
}
#form-head-title{font-size:13px;font-weight:500;color:rgba(30,40,80,.8);letter-spacing:.06em}
#form-head button{
  width:28px;height:28px;border:none;background:rgba(0,0,0,.06);
  border-radius:50%;cursor:pointer;font-size:18px;color:rgba(0,0,0,.4);
  display:flex;align-items:center;justify-content:center;padding-bottom:1px;
}
#presets-section{margin-bottom:14px}
.presets-label{font-size:10px;font-weight:500;letter-spacing:.12em;color:rgba(80,100,150,.55);margin-bottom:7px}

.preset-chip{
  padding:7px 13px;font-size:13px;font-family:inherit;
  background:rgba(230,236,255,.7);border:0.5px solid rgba(120,150,220,.35);

}
.preset-chip:active{background:rgba(200,215,250,.9)}

  width:100%;padding:10px 12px;font-size:14px;font-family:inherit;
  border:0.5px solid rgba(140,160,210,.4);border-radius:10px;
  outline:none;color:rgba(28,38,70,.85);background:#fff;margin-bottom:12px;
}
#form-name:focus{border-color:rgba(80,120,200,.5)}
#form-opts-list{max-height:130px;overflow-y:auto;margin-bottom:8px}
.form-opt-row{

}
.form-opt-row span{font-size:13px;color:rgba(28,38,70,.8)}

  width:22px;height:22px;border:none;background:rgba(0,0,0,.08);

}
#form-opt-row{display:flex;gap:7px;margin-bottom:14px}
#form-opt-input{

}
#form-opt-input:focus{border-color:rgba(80,120,200,.5)}
#form-opt-add{
  padding:9px 14px;background:rgba(210,220,245,.7);
  border:0.5px solid rgba(130,155,215,.4);border-radius:10px;
  font-size:13px;font-weight:500;font-family:inherit;
  color:rgba(50,80,180,.8);cursor:pointer;white-space:nowrap;
}
#form-footer{padding:8px 18px 28px;flex-shrink:0}

  width:100%;padding:13px;font-size:13px;font-weight:500;letter-spacing:.08em;

}
#form-submit:active{opacity:.85}

// ── Watercolor ──
const wcLayer = document.getElementById('wc-layer');
let W=window.innerWidth, H=window.innerHeight;
let startTime=null;
const REVEAL_DUR=600000;
function updateWC(elapsed){
  const prog=Math.min(1,elapsed/REVEAL_DUR);
  const eased=1-Math.pow(1-prog,5);
  const maxR=Math.sqrt(W*W+H*H)*1.15;
  wcLayer.style.clipPath=`circle(${Math.round(eased*maxR)}px at calc(100% + 30px) -30px)`;
}

const trailCtx=trailCanvas.getContext('2d');
function resize(){
  W=trailCanvas.width=window.innerWidth;
  H=trailCanvas.height=window.innerHeight;
}

const LEMON_W=169;
let lemonH=135;
lemonEl.onload=()=>{lemonH=lemonEl.naturalHeight*(LEMON_W/lemonEl.naturalWidth);};
let lx=60,ly=-160,vx=1.2,vy=0;
const GRAVITY=.42,DAMP_Y=.52,DAMP_X=.68,FRICTION=.993;
let dragging=false,dragOffX=0,dragOffY=0,prevMX=0,prevMY=0,mvx=0,mvy=0;
function lemonCenter(){return{x:lx+LEMON_W/2,y:ly+lemonH/2};}
function onDown(cx,cy){dragging=true;dragOffX=cx-lx;dragOffY=cy-ly;prevMX=cx;prevMY=cy;mvx=mvy=vx=vy=0;lemonEl.classList.add('dragging');}
function onMove(cx,cy){if(!dragging)return;mvx=cx-prevMX;mvy=cy-prevMY;prevMX=cx;prevMY=cy;lx=cx-dragOffX;ly=cy-dragOffY;}
function onUp(){if(!dragging)return;dragging=false;vx=mvx*.85;vy=mvy*.85;lemonEl.classList.remove('dragging');}
lemonEl.addEventListener('mousedown',e=>{onDown(e.clientX,e.clientY);e.preventDefault();});
window.addEventListener('mousemove',e=>onMove(e.clientX,e.clientY));
window.addEventListener('mouseup',onUp);
lemonEl.addEventListener('touchstart',e=>{const t=e.touches[0];onDown(t.clientX,t.clientY);e.preventDefault();},{passive:false});
window.addEventListener('touchmove',e=>{const t=e.touches[0];onMove(t.clientX,t.clientY);e.preventDefault();},{passive:false});
window.addEventListener('touchend',onUp);

const trail=[],TRAIL_INTERVAL=35,T_RADIUS=105,T_MAX_AGE=3200;
let lastTrailT=0;

function loop(ts){
  if(!startTime)startTime=ts;
  const elapsed=ts-startTime,now=performance.now();
  updateWC(elapsed);
  if(!dragging){
    vy+=GRAVITY;lx+=vx;ly+=vy;vx*=FRICTION;
    if(lx<0){lx=0;vx=Math.abs(vx)*DAMP_X;}
    if(lx+LEMON_W>W){lx=W-LEMON_W;vx=-Math.abs(vx)*DAMP_X;}
    if(ly<0){ly=0;vy=Math.abs(vy)*DAMP_Y;}
    if(ly+lemonH>H){ly=H-lemonH;vy=-Math.abs(vy)*DAMP_Y;vx*=DAMP_X;if(Math.abs(vy)<1.2)vy=0;if(Math.abs(vx)<.2)vx=0;}
  }
  lemonEl.style.left=lx+'px';lemonEl.style.top=ly+'px';
  if(now-lastTrailT>TRAIL_INTERVAL){const c=lemonCenter();trail.push({x:c.x,y:c.y,t:now});lastTrailT=now;}
  const cutoff=now-T_MAX_AGE;
  while(trail.length&&trail[0].t<cutoff)trail.shift();
  trailCtx.clearRect(0,0,W,H);
  for(let i=0;i<trail.length;i++){
    const pt=trail[i],age=now-pt.t;if(age>T_MAX_AGE)continue;
    let op;const rampIn=80,fadeStart=T_MAX_AGE*.3;
    if(age<rampIn)op=.88*(age/rampIn);
    else if(age<fadeStart)op=.88;
    else op=.88*(1-(age-fadeStart)/(T_MAX_AGE-fadeStart));
    if(op<=.01)continue;
    const g=trailCtx.createRadialGradient(pt.x,pt.y,0,pt.x,pt.y,T_RADIUS);
    g.addColorStop(0,`rgba(255,255,255,${op})`);
    g.addColorStop(.45,`rgba(255,255,255,${op*.7})`);
    g.addColorStop(.78,`rgba(255,255,255,${op*.25})`);
    g.addColorStop(1,`rgba(255,255,255,0)`);
    trailCtx.fillStyle=g;trailCtx.beginPath();trailCtx.arc(pt.x,pt.y,T_RADIUS,0,Math.PI*2);trailCtx.fill();
  }
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

];
// Presets pool: builtin + deleted cards
let presetsPool=[...BUILTIN_PRESETS.map(p=>({...p,builtin:true}))];

let categories=[
  {id:'c0',label:'光源の位置',
   options:['真上','右斜め上','真右','右斜め下','真下','左斜め下','真左','左斜め上',
            '奥','奥上','奥右斜め上','奥右','奥右斜め下','奥下','奥左斜め下','奥左','奥左斜め上',
            '手前','手前上','手前右斜め上','手前右','手前右斜め下','手前下','手前左斜め下','手前左','手前左斜め上'],
   current:null,locked:false},
  {id:'c1',label:'光源の強さ',options:['弱','中','強'],current:null,locked:false},
  {id:'c2',label:'時間帯',options:['早朝','朝','夕方','宵の口','深夜'],current:null,locked:false},
  {id:'c3',label:'キャラの構図',
   options:['フカン全身','アオリ全身','フカンバストアップ','アオリバストアップ',
            'フカンウエストショット','アオリウエストショット','フカンニーショット','アオリニーショット',
            'アオリクローズアップ','フカンクローズアップ'],
   current:null,locked:false},
];
let catCounter=4;
function pick(a){return a[Math.floor(Math.random()*a.length)];}

// ── Render cards ──
function renderCards(){
  const wrap=document.getElementById('cards-wrap');
  wrap.innerHTML='';
  categories.forEach(cat=>{
    const div=document.createElement('div');
    div.className='card'+(cat.locked?' locked':'');
    div.id='card-'+cat.id;
    div.innerHTML=`
      <div class="card-header">
        <span class="card-label">${cat.label}</span>
        <button class="lock-btn${cat.locked?' on':''}" data-id="${cat.id}">
          <svg width="13" height="13" viewBox="0 0 16 16" fill="none">
            <rect x="3" y="7.5" width="10" height="7" rx="1.5" stroke="currentColor" stroke-width="1.2"/>
            <path d="${cat.locked?'M5.5 7.5V5a2.5 2.5 0 0 1 5 0':'M5.5 7.5V5a2.5 2.5 0 0 1 5 0v2.5'}"
              stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
      <div class="card-value${cat.current?'':' empty'}" id="val-${cat.id}">${cat.current||'タップして選択'}</div>`;
    div.addEventListener('click',e=>{if(e.target.closest('.lock-btn'))return;openSheet(cat.id);});
    div.querySelector('.lock-btn').addEventListener('click',e=>{e.stopPropagation();toggleLock(cat.id);});
    wrap.appendChild(div);
  });
}
function toggleLock(id){
  const cat=categories.find(c=>c.id===id);if(!cat)return;
  cat.locked=!cat.locked;renderCards();
}

// ── Roll ──
function rollAll(){
  const btn=document.getElementById('roll-btn');btn.disabled=true;
  const next={};
  categories.forEach(cat=>{next[cat.id]=cat.locked?cat.current:pick(cat.options);});
  let tick=0,maxTick=7;
  const iv=setInterval(()=>{
    tick++;
    categories.forEach(cat=>{
      if(!cat.locked){const v=document.getElementById('val-'+cat.id);if(v){v.textContent=pick(cat.options);v.style.opacity=String(.15+.8*(tick/maxTick));}}
    });
    if(tick>=maxTick){
      clearInterval(iv);
      categories.forEach(cat=>{
        cat.current=next[cat.id];
        const v=document.getElementById('val-'+cat.id);
        if(v){v.textContent=cat.current||'タップして選択';v.style.opacity='1';v.className='card-value'+(cat.current?'':' empty');
          const card=document.getElementById('card-'+cat.id);if(card){card.classList.remove('popin');void card.offsetWidth;card.classList.add('popin');}}
      });
      btn.disabled=false;
    }
  },55);
}

// ── Selection sheet ──
let activeSheetId=null;
function openSheet(id){
  const cat=categories.find(c=>c.id===id);if(!cat)return;
  activeSheetId=id;
  document.getElementById('sheet-title').textContent=cat.label;
  const list=document.getElementById('sheet-list');list.innerHTML='';
  cat.options.forEach(opt=>{
    const row=document.createElement('div');
    row.className='sheet-opt'+(cat.current===opt?' selected':'');
    row.innerHTML=`<span>${opt}</span>`+(cat.current===opt?`<svg class="check" viewBox="0 0 20 20" fill="none"><path d="M4 10l4.5 4.5L16 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`:'');
    row.addEventListener('click',()=>{cat.current=opt;const v=document.getElementById('val-'+cat.id);if(v){v.textContent=opt;v.className='card-value';}closeSheet();});
    list.appendChild(row);
  });
  document.getElementById('sheet-overlay').classList.add('open');
  setTimeout(()=>{const sel=list.querySelector('.selected');if(sel)sel.scrollIntoView({block:'center'});},100);
}
function closeSheet(){document.getElementById('sheet-overlay').classList.remove('open');activeSheetId=null;}
document.getElementById('sheet-overlay').addEventListener('click',function(e){if(e.target===this)closeSheet();});
document.getElementById('sheet-back-btn').addEventListener('click',closeSheet);
document.getElementById('sheet-delete-btn').addEventListener('click',()=>{
  if(!activeSheetId)return;
  const cat=categories.find(c=>c.id===activeSheetId);if(!cat)return;
  document.getElementById('del-confirm-msg').innerHTML=`「<strong>${cat.label}</strong>」を削除しますか？<br><span style="font-size:12px;color:rgba(120,120,140,.7);">プリセットに移動されます</span>`;
  document.getElementById('del-confirm').classList.add('open');
});

// ── Delete confirm ──
document.getElementById('del-btn-cancel').addEventListener('click',()=>{
  document.getElementById('del-confirm').classList.remove('open');
});
document.getElementById('del-btn-ok').addEventListener('click',()=>{
  if(!activeSheetId)return;
  const idx=categories.findIndex(c=>c.id===activeSheetId);
  if(idx===-1)return;
  const cat=categories[idx];
  // Move to presets pool if not already there
  if(!presetsPool.find(p=>p.label===cat.label)){
    presetsPool.push({label:cat.label,options:[...cat.options]});
  }
  categories.splice(idx,1);
  renderCards();
  document.getElementById('del-confirm').classList.remove('open');
  closeSheet();
});
document.getElementById('del-confirm').addEventListener('click',function(e){
  if(e.target===this)document.getElementById('del-confirm').classList.remove('open');
});

// ── Add form ──
let formOpts=[];
function openForm(){
  formOpts=[];
  document.getElementById('form-name').value='';
  document.getElementById('form-opt-input').value='';
  renderFormOpts();
  renderPresets();
  document.getElementById('form-overlay').classList.add('open');
}
function closeForm(){document.getElementById('form-overlay').classList.remove('open');}
document.getElementById('form-overlay').addEventListener('click',function(e){if(e.target===this)closeForm();});

function renderPresets(){
  const list=document.getElementById('presets-list');list.innerHTML='';
  if(presetsPool.length===0){list.style.display='none';document.getElementById('presets-section').style.display='none';return;}
  document.getElementById('presets-section').style.display='';
  list.style.display='';
  presetsPool.forEach(p=>{
    const alreadyActive=categories.find(c=>c.label===p.label);
    const chip=document.createElement('button');
    chip.className='preset-chip'+(alreadyActive?' used':'');
    chip.textContent=p.label;
    if(!alreadyActive){
      chip.addEventListener('click',()=>{
        categories.push({id:'c'+catCounter++,label:p.label,options:[...p.options],current:null,locked:false});
        renderCards();renderPresets();
      });
    } else {chip.disabled=true;}
    list.appendChild(chip);
  });
}

function renderFormOpts(){
  const list=document.getElementById('form-opts-list');list.innerHTML='';
  formOpts.forEach((opt,i)=>{
    const row=document.createElement('div');row.className='form-opt-row';
    row.innerHTML=`<span>${opt}</span><button>×</button>`;
    row.querySelector('button').addEventListener('click',()=>{formOpts.splice(i,1);renderFormOpts();});
    list.appendChild(row);
  });
}
function addFormOpt(){
  const inp=document.getElementById('form-opt-input');const v=inp.value.trim();if(!v)return;
  formOpts.push(v);inp.value='';renderFormOpts();inp.focus();
}
document.getElementById('form-opt-input').addEventListener('keydown',e=>{if(e.key==='Enter')addFormOpt();});
function submitForm() {
  const name = document.getElementById('form-name').value.trim();
  if (!name) { document.getElementById('form-name').focus(); return; }
  if (formOpts.length === 0) { document.getElementById('form-opt-input').focus(); return; }
  
  categories.push({ id: 'c' + catCounter++, label: name, options: [...formOpts], current: null, locked: false });
  
  renderCards();
  closeForm();

  // 追加：新しいカードが見えるように一番下へスクロール
  setTimeout(() => {
    const inner = document.getElementById('ui-inner');
    inner.scrollTo({ top: inner.scrollHeight, behavior: 'smooth' });
  }, 100);
}
// ── Init ──
renderCards();
</script>
</body>
</html>
