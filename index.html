<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>ランダム</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#fff;
  font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic UI',sans-serif}

#bgCanvas,#trailCanvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none}

#lemon{position:fixed;width:169px;height:auto;cursor:grab;user-select:none;z-index:50;
  filter:drop-shadow(0 6px 18px rgba(0,0,0,0.15));touch-action:none}
#lemon.dragging{cursor:grabbing;filter:drop-shadow(0 14px 30px rgba(0,0,0,0.25))}

/* ── Main UI ── */
#ui{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  z-index:30;width:min(420px,92vw);
  max-height:88vh;overflow-y:auto;
  scrollbar-width:none;
}
#ui::-webkit-scrollbar{display:none}

#ui-title{
  text-align:center;font-size:13px;font-weight:500;letter-spacing:.22em;
  color:rgba(40,40,70,.65);margin-bottom:1rem;
}

.cards{display:grid;gap:8px}

.card{
  /* ２.txtのスタイルを適用 [cite: 2] */
  background:rgba(255,255,255,.62);
  backdrop-filter:blur(18px) saturate(1.4);
  -webkit-backdrop-filter:blur(18px) saturate(1.4);
  border:0.5px solid rgba(140,160,210,.3);
  border-radius:13px;padding:11px 14px;
  cursor:pointer;transition:background .15s;
  position:relative;
}
.card:active{background:rgba(240,244,255,.75)}
.card.locked{border-color:rgba(90,130,210,.45); background:rgba(255,255,255,.82);}

.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.card-label{font-size:10px;font-weight:500;letter-spacing:.14em;color:rgba(80,100,150,.65)}

.lock-btn{
  width:28px;height:28px;border:0.5px solid rgba(140,160,210,.35);
  border-radius:7px;background:transparent;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:rgba(120,145,195,.55);transition:all .15s;padding:0;flex-shrink:0;
}
.lock-btn.on{
  background:rgba(210,220,245,.55);border-color:rgba(90,130,210,.5);
  color:rgba(60,90,180,.8);
}

.card-value{
  font-size:20px;font-weight:500;color:rgba(28,38,70,.85);
  letter-spacing:-.01em;min-height:28px;
}
.card-value.empty{color:rgba(160,170,200,.5);font-size:16px}

/* ── Buttons ── */
#ui-footer{display:flex;gap:8px;margin-top:10px}
#roll-btn{
  flex:1;padding:13px;font-size:13px;font-weight:500;letter-spacing:.1em;
  font-family:inherit;
  /* ２.txtのスタイルを適用 [cite: 2] */
  background:rgba(50,75,170,.82);color:rgba(255,255,255,.95);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  border:none;border-radius:12px;cursor:pointer;transition:opacity .15s,transform .1s;
}
#roll-btn:hover{opacity:.88}
#roll-btn:active{transform:scale(.98)}
#roll-btn:disabled{opacity:.35;cursor:not-allowed}
#add-btn{
  width:48px;height:48px;font-size:22px;line-height:1;
  /* 透過度を下げてぼかしを追加 */
  background:rgba(255,255,255,.7);border:0.5px solid rgba(140,160,210,.35);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  border-radius:12px;cursor:pointer;color:rgba(80,110,190,.7);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:background .15s;
}
#add-btn:active{background:rgba(230,236,255,.85)}

/* ── Bottom Sheet (selection) ── */
#sheet-overlay{
  position:fixed;inset:0;z-index:100;
  background:rgba(0,0,0,0);
  transition:background .25s;
  pointer-events:none;
}
#sheet-overlay.open{background:rgba(0,0,0,.25);pointer-events:auto}
#sheet{
  position:absolute;bottom:0;left:0;right:0;
  /* ２.txtの雰囲気に合わせ透過とぼかしを適用 */
  background:rgba(255,255,255,.85);
  backdrop-filter:blur(25px) saturate(1.2);
  -webkit-backdrop-filter:blur(25px) saturate(1.2);
  border-radius:18px 18px 0 0;
  max-height:72vh;display:flex;flex-direction:column;
  transform:translateY(100%);transition:transform .28s cubic-bezier(.22,1,.36,1);
  box-shadow:0 -4px 40px rgba(0,0,0,.12);
}
#sheet-overlay.open #sheet{transform:translateY(0)}
#sheet-handle{width:36px;height:4px;background:rgba(0,0,0,.12);border-radius:2px;margin:10px auto 0}
#sheet-header{
  padding:12px 16px 10px;display:flex;align-items:center;justify-content:space-between;
  border-bottom:0.5px solid rgba(0,0,0,.07);flex-shrink:0;
}
#sheet-title{font-size:13px;font-weight:500;color:rgba(30,40,80,.8);letter-spacing:.06em}
#sheet-close-btn{
  width:28px;height:28px;border:none;background:rgba(0,0,0,.06);
  border-radius:50%;cursor:pointer;font-size:16px;color:rgba(0,0,0,.4);
  display:flex;align-items:center;justify-content:center;
}
#sheet-list{overflow-y:auto;flex:1;padding:6px 0 24px}
.sheet-opt{
  padding:13px 18px;font-size:15px;color:rgba(28,38,70,.85);
  cursor:pointer;display:flex;align-items:center;justify-content:space-between;
  transition:background .1s;
}
.sheet-opt:active{background:rgba(230,236,255,.8)}
.sheet-opt.selected{color:rgba(50,80,190,.9);font-weight:500}
.sheet-opt .check{width:18px;height:18px;color:rgba(50,80,190,.8)}

/* ── Add Form ── */
#form-overlay{
  position:fixed;inset:0;z-index:110;
  background:rgba(0,0,0,0);transition:background .25s;pointer-events:none;
}
#form-overlay.open{background:rgba(0,0,0,.3);pointer-events:auto}
#form-panel{
  position:absolute;bottom:0;left:0;right:0;
  /* 透過とぼかしを適用 */
  background:rgba(255,255,255,.85);
  backdrop-filter:blur(25px) saturate(1.2);
  -webkit-backdrop-filter:blur(25px) saturate(1.2);
  border-radius:18px 18px 0 0;
  padding:0 0 32px;
  transform:translateY(100%);transition:transform .28s cubic-bezier(.22,1,.36,1);
  box-shadow:0 -4px 40px rgba(0,0,0,.14);
}
#form-overlay.open #form-panel{transform:translateY(0)}
#form-handle{width:36px;height:4px;background:rgba(0,0,0,.12);border-radius:2px;margin:10px auto 0}
#form-inner{padding:14px 18px 0}
#form-head{
  display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;
}
#form-head span{font-size:13px;font-weight:500;color:rgba(30,40,80,.8);letter-spacing:.06em}
#form-head button{
  width:28px;height:28px;border:none;background:rgba(0,0,0,.06);
  border-radius:50%;cursor:pointer;font-size:16px;color:rgba(0,0,0,.4);
}
.form-field-label{font-size:10.5px;font-weight:500;color:rgba(80,100,150,.6);
  letter-spacing:.1em;margin-bottom:5px}
#form-name{
  width:100%;padding:10px 12px;font-size:14px;font-family:inherit;
  border:0.5px solid rgba(140,160,210,.4);border-radius:10px;
  outline:none;color:rgba(28,38,70,.85);background:rgba(255,255,255,.5);margin-bottom:12px;
}
#form-name:focus{border-color:rgba(80,120,200,.5)}
#form-opts-list{max-height:140px;overflow-y:auto;margin-bottom:8px}
.form-opt-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:6px 8px;border-radius:8px;margin-bottom:3px;
  background:rgba(230,236,255,.45);
}
.form-opt-row span{font-size:13px;color:rgba(28,38,70,.8)}
.form-opt-row button{
  width:22px;height:22px;border:none;background:rgba(0,0,0,.08);
  border-radius:50%;font-size:13px;cursor:pointer;color:rgba(0,0,0,.4);
  display:flex;align-items:center;justify-content:center;
}
#form-opt-row{display:flex;gap:7px;margin-bottom:14px}
#form-opt-input{
  flex:1;padding:9px 12px;font-size:14px;font-family:inherit;
  border:0.5px solid rgba(140,160,210,.4);border-radius:10px;
  outline:none;color:rgba(28,38,70,.85);background:rgba(255,255,255,.5);
}
#form-opt-input:focus{border-color:rgba(80,120,200,.5)}
#form-opt-add{
  padding:9px 14px;background:rgba(210,220,245,.7);
  border:0.5px solid rgba(130,155,215,.4);border-radius:10px;
  font-size:13px;font-weight:500;color:rgba(60,90,180,.85);cursor:pointer;
}

#form-submit{
  width:100%;padding:12px;background:rgba(50,80,180,.85);color:#fff;
  border:none;border-radius:12px;font-size:14px;font-weight:500;
  letter-spacing:.05em;cursor:pointer;box-shadow:0 4px 15px rgba(50,80,180,.2);
}

@keyframes pop{from{opacity:.1;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.popin .card-value{animation:pop .2s ease-out}
</style>
</head>
<body>
<canvas id="bgCanvas"></canvas>
<canvas id="trailCanvas"></canvas>
<img id="lemon" draggable="false">

<div id="ui">
  <div id="ui-title">RANDOM SELECTOR</div>
  <div class="cards" id="cards-container"></div>
  <div id="ui-footer">
    <button id="roll-btn" onclick="rollAll()">ROLL</button>
    <button id="add-btn" onclick="openForm()">+</button>
  </div>
</div>

<div id="sheet-overlay">
  <div id="sheet">
    <div id="sheet-handle"></div>
    <div id="sheet-header">
      <span id="sheet-title">項目を選択</span>
      <button id="sheet-close-btn" onclick="closeSheet()">×</button>
    </div>
    <div id="sheet-list"></div>
  </div>
</div>

<div id="form-overlay">
  <div id="form-panel">
    <div id="form-handle"></div>
    <div id="form-inner">
      <div id="form-head">
        <span>新しいカードを追加</span>
        <button onclick="closeForm()">×</button>
      </div>
      <div class="form-field-label">タイトル</div>
      <input type="text" id="form-name" placeholder="例: キャラクター">
      <div class="form-field-label">選択肢</div>
      <div id="form-opts-list"></div>
      <div id="form-opt-row">
        <input type="text" id="form-opt-input" placeholder="追加する内容...">
        <button id="form-opt-add" onclick="addFormOpt()">追加</button>
      </div>
      <button id="form-submit" onclick="submitForm()">カードを作成</button>
    </div>
  </div>
</div>

<script>
// ── Canvas Background ──
const bg=document.getElementById('bgCanvas'),ctx=bg.getContext('2d');
const tr=document.getElementById('trailCanvas'),tctx=tr.getContext('2d');
let w,h,trails=[];
function resize(){
  w=bg.width=tr.width=window.innerWidth;
  h=bg.height=tr.height=window.innerHeight;
}
window.addEventListener('resize',resize);resize();

const wcImg=new Image();
wcImg.src='data:image/jpeg;base64,/9j/4AAQSkZJRgABAQEBLAEsAAD/4QDvRXhpZgAASUkqAAgAAAADAA4BAgClAAAAMgAAABoBBQABAAAA1wAAABsBBQABAAAA3wAAAAAAAABBYnN0cmFjdCB3YXRlcmNvbG9yIGJsdWUgc2t5IHBhaW50IGlzb2xhdGVkIG9uIHdoaXRlIGJhY2tncm91bmQuIEhhbmQtcGFpbnRlZCB3YXRlcmNvbG9yIHNwbGF0dGVyIHN0YWlucyBhcnRpc3RpYyB2ZWN0b3IgdXNlZCBhcyBhbiBlbGVtZW50IGluIHRoZSBkZWNvcmF0aXZlIGRlc2lnbi4sAQAAAQAAACwBAAABAAAA/+EGFGh0dHA6Ly9ucy5hZG9iZS5jb20veGFwLzEuMC8APD94cGFja2V0IGJlZ2luPSLvu78iIGlkPSJXNU0wTXBDZWhpSHpyZVN6TlRjemtjOWQiPz4KPHg6eG1wbWV0YSB4bWxuczp4PSJhZG9iZTpuczptZXRhLyIgeDp4bXB0az0iQWRvYmUgWE1QIENvcmUgNS42LWMxNDAgNzkuMTYwNDUxLCAyMDE3LzA1LzA2LTAxOjA4OjIxICAgICAgICAiPgogPHJkZjpSREYgeG1sbnM6cmRmPSJodHRwOi8vd3d3LnczLm9yZy8xOTk5LzAyLzIyLXJkZi1zeW50YXgtbnMjIj4KICA8cmRmOkRlc2NyaXB0aW9uIHJkZjphYm91dD0iIgogICAgeG1sbnM6eG1wTU09Imh0dHA6Ly9ucy5hZG9iZS5jb20veGFwLzEuMC9tbS8iCiAgICB4bWxuczpzdFJlZj0iaHR0cDovL25zLmFkb2JlLmNvbS94YXAvMS4wL3NUeXBlL1Jlc291cmNlUmVmIyIKICAgIHhtbG5zOnhtcD0iaHR0cDovL25zLmFkb2JlLmNvbS94YXAvMS4wLyIKICAgIHhtbG5zOmRjPSJodHRwOi8vcHVybC5vcmcvZGMvZWxlbWV...'; // 省略
const lemonImg=new Image();
lemonImg.src='data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAKkAAACpCAYAAAC98T0KAAAACXBIWXMAAAsTAAALEwEAmpwYAAAKT2lDQ1BQaG90b3Nob3AgSUNDIHByb2ZpbGUAAHjanVNnVFPpFj33vRRx...'; // 省略

function drawBg(){
  ctx.clearRect(0,0,w,h);
  if(wcImg.complete)ctx.drawImage(wcImg,0,0,w,h);
  requestAnimationFrame(drawBg);
}
drawBg();

// ── Lemon Drag ──
const lemon=document.getElementById('lemon');
let lx=window.innerWidth-100,ly=window.innerHeight-120,lvx=0,lvy=0,isDrag=false;
let ox,oy;
lemon.src=lemonImg.src;
function updateLemon(){
  if(!isDrag){
    lx+=lvx;ly+=lvy;lvx*=0.92;lvy*=0.92;
    if(lx<0){lx=0;lvx*=-0.5}if(lx>w-120){lx=w-120;lvx*=-0.5}
    if(ly<0){ly=0;lvy*=-0.5}if(ly>h-120){ly=h-120;lvy*=-0.5}
  }
  lemon.style.transform=`translate(${lx}px,${ly}px)`;
  requestAnimationFrame(updateLemon);
}
updateLemon();
lemon.addEventListener('pointerdown',e=>{
  isDrag=true;lemon.classList.add('dragging');
  ox=e.clientX-lx;oy=e.clientY-ly;
  lemon.setPointerCapture(e.pointerId);
});
lemon.addEventListener('pointermove',e=>{
  if(!isDrag)return;
  const nx=e.clientX-ox,ny=e.clientY-oy;
  lvx=nx-lx;lvy=ny-ly;lx=nx;ly=ny;
});
lemon.addEventListener('pointerup',e=>{
  isDrag=false;lemon.classList.remove('dragging');
  lemon.releasePointerCapture(e.pointerId);
});

// ── App Logic ──
let items=[
  {id:'i1',name:'光源の位置',opts:['左上','右上','正面','逆光','真上','真下'],val:'正面',locked:false},
  {id:'i2',name:'時間帯',opts:['早朝','昼','夕方','夜','深夜'],val:'昼',locked:false}
];

function render(){
  const container=document.getElementById('cards-container');
  container.innerHTML='';
  items.forEach(item=>{
    const card=document.createElement('div');
    card.className='card'+(item.locked?' locked':'');
    card.innerHTML=`
      <div class="card-header">
        <span class="card-label">${item.name}</span>
        <button class="lock-btn${item.locked?' on':''}" onclick="event.stopPropagation();toggleLock('${item.id}')">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="3" y="7" width="10" height="7" rx="1.5"/>
            <path d="${item.locked?'M5.5 7V4.5a2.5 2.5 0 0 1 5 0V7':'M5.5 7V4.5a2.5 2.5 0 0 1 5 0'}"/>
          </svg>
        </button>
      </div>
      <div class="card-value">${item.val||'<span class="empty">未設定</span>'}</div>
    `;
    card.onclick=()=>openSheet(item.id);
    container.appendChild(card);
  });
}
render();

function toggleLock(id){
  const item=items.find(i=>i.id===id);
  if(item)item.locked=!item.locked;
  render();
}

function rollAll(){
  const btn=document.getElementById('roll-btn');
  btn.disabled=true;
  const container=document.getElementById('cards-container');
  container.classList.add('popin');
  let count=0;
  const iv=setInterval(()=>{
    items.forEach(item=>{
      if(!item.locked)item.val=item.opts[Math.floor(Math.random()*item.opts.length)];
    });
    render();
    if(++count>8){
      clearInterval(iv);
      btn.disabled=false;
      setTimeout(()=>container.classList.remove('popin'),300);
    }
  },60);
}

// ── Sheet ──
let activeId=null;
function openSheet(id){
  activeId=id;
  const item=items.find(i=>i.id===id);
  document.getElementById('sheet-title').textContent=item.name;
  const list=document.getElementById('sheet-list');
  list.innerHTML='';
  item.opts.forEach(opt=>{
    const div=document.createElement('div');
    div.className='sheet-opt'+(item.val===opt?' selected':'');
    div.innerHTML=`<span>${opt}</span>${item.val===opt?'<span class="check">✓</span>':''}`;
    div.onclick=()=>{
      item.val=opt;
      render();
      closeSheet();
    };
    list.appendChild(div);
  });
  document.getElementById('sheet-overlay').classList.add('open');
}
function closeSheet(){
  document.getElementById('sheet-overlay').classList.remove('open');
}
document.getElementById('sheet-overlay').addEventListener('click',e=>{
  if(e.target.id==='sheet-overlay')closeSheet();
});

// ── Form ──
let formOpts=[];
function openForm(){
  formOpts=['選択肢1'];
  document.getElementById('form-name').value='';
  renderFormOpts();
  document.getElementById('form-overlay').classList.add('open');
  setTimeout(()=>document.getElementById('form-name').focus(),300);
}
function closeForm(){
  document.getElementById('form-overlay').classList.remove('open');
}
function renderFormOpts(){
  const list=document.getElementById('form-opts-list');
  list.innerHTML='';
  formOpts.forEach((opt,i)=>{
    const row=document.createElement('div');
    row.className='form-opt-row';
    row.innerHTML=`<span>${opt}</span><button onclick="formOpts.splice(${i},1);renderFormOpts()">×</button>`;
    list.appendChild(row);
  });
}
function addFormOpt(){
  const inp=document.getElementById('form-opt-input');
  if(!inp.value.trim())return;
  formOpts.push(inp.value.trim());
  inp.value='';
  renderFormOpts();
}
function submitForm(){
  const name=document.getElementById('form-name').value.trim();
  if(!name || formOpts.length===0) return;
  items.push({id:'i'+Date.now(),name,opts:[...formOpts],val:formOpts[0],locked:false});
  render();
  closeForm();
}
</script>
</body>
</html>
